#CAN配置栏主要配置CAN盒设置，包括设备名称、后端、波特率、数据位、停止位、校验位、通道号、是否开启FD模式
can:
  device: TZUSB2CAN
  backend: candle
  baud_rate: 500000
  dbit_baud_rate: 4000000
  sp: 0.8
  dsp: 0.75
  channels: [0]
  fd: true

#motor设置栏主要配置电机参数，包括vesc_id、应用模式、位置窗口、峰值电流限制、极对数、齿轮比、最大速度
motor:
  vesc_id: 45
  # robotic_arm: 启用 pid_pos 角度安全窗口与速度环限位反向
  # rotary_motor: 关闭角度安全窗口，仅保留电流限制
  application_mode: rotary_motor
  pos_window_deg: [10.0, 80.0]
  peak_current_limit_a: 20.0
  pole_pairs: 14
  gear_ratio: 48.0
  l_max_erpm: 50000.0

#速度环自整定参数设置
speed_tuner:
  test_erpms: [1000.0] # 测试速度，单位为ERPM
  trial_seconds: 15.0 # 试验时间，单位为秒
  command_hz: 100.0 # 命令频率，单位为Hz
  read_hz: 300.0 # 读取频率，单位为Hz
  # 速度环试验在机械臂位置窗口附近允许的软限位额外容差。
  # 命中反向阈值后，若因惯性或采样延迟有少量越界，仍可在此容差内继续受保护运行。
  reverse_soft_limit_tolerance_deg: 10.0
  #steady_state_priority: true 表示优先考虑稳态响应，会忽略超调等因素进行PI参数调整
  steady_state_priority: false
  identification:
    enabled: false
    estimate_kind: unloaded_first_pass
    # true 时：辨识完成后，按极点对消法生成一组速度环初始参数并直接退出，不进入后续 rule-based 微调。
    exit_after_parameter_generation: false
    parameter_generation_method: pole_cancellation_pi
    controller_speed_unit: erpm
    feedback_speed_unit: erpm
    #这里设置的是是否在辨识前手动确认，false表示自动确认，true表示手动确认。
    manual_confirm_before_identification: false
    # 首轮辨识默认电流:
    # 若 iq_test_a 留空，则使用 peak_current_limit_a * iq_test_ratio
    # 这里默认 20A * 0.10 = 2.0A
    iq_test_a: 0.17
    #这里填写数据为电流环带宽的1/10,这里vesc固件当中电流环带宽为1000rad/s，故这里使用vesc驱动的电机应该为固定值100，
    #但是实际使用时可能会造成电机震荡，这里需要根据实际情况调整，这个数值越小给出的kp,ki值会越小。
    target_bandwidth_rad_s: 100 
    #这里填写电机参数当中的额定力矩，单位为NM/A:
    torque_constant_nm_per_a: 0.8
  #这里设置的是单独跑规则调试时使用的pi初值，如果在机械臂等不方便进行初整定的情况时，可以使用空载时整定完成的pi值填入initial_pi进行后续rule_base微调。
  initial_pi:
    s_pid_kp: 0.0005
    s_pid_ki: 0.00045
  # 单次运行内先做 10 轮粗调，再自动以历史最优参数为起点做 5 轮精调。
  coarse_iterations: 10
  fine_iterations: 5
  improve_threshold: 0.5
  # auto_write_params=true 时，调试过程中会自动写入参数并自动进入下一轮；
  # 每次写入后会回读校验，不一致则立即终止；整轮结束后会把历史最优参数带保存标志写入。
  auto_write_params: false
  #这里是设置的是可允许调整kp,ki的最大步长，kp,ki的步长为[kp_step, ki_step]
  step_scale:
    kp: 1.5
    ki: 1.5
  # 精调阶段使用更小步长，避免在较优区间内跨步过大。
  fine_step_scale:
    kp: 0.15
    ki: 0.15
  #这里设置的是kp,ki的上下限，kp,ki的取值范围为[kp_min, kp_max]，[ki_min, ki_max]
  param_limits:
    kp_min: 0.0005
    kp_max: 0.0500
    ki_min: 0.0000
    ki_max: 0.5000
  #这里设置的是是否在每次迭代后手动确认，false表示自动确认，true表示手动确认。
  manual_confirm_each_iteration: false
  kpi_weights:
    steady_error: 0.6
    overshoot: 0.15
    settling_time: 0.25
    current_efficiency: 0.00

position_tuner:
  target_positions_deg: [40,70.0] #设置测试角度
  trial_seconds: 30.0 #设置试验时间
  sample_timeout_s: 0.05 #设置采样超时时间，单位为秒
  command_hz: 100.0 #设置命令频率，单位为Hz
  read_hz: 300.0 #设置读取频率，单位为Hz
  motion_duration_s: 0.5 #设置运动持续时间，单位为秒
  ff_rpm_bias: 0.0 #设置ff_rpm偏置，单位为ERPM
  ff_current_a: 0.0 #设置ff_current偏置，单位为A
  initial_params_formula:
    position_interpretation: output_shaft #设置位置解释为输出轴位置
    speed_bandwidth_rad_s: 100.0 #设置速度环宽，单位为rad/s
    position_to_speed_bandwidth_ratio: 8.0 #设置位置环宽与速度环宽的比值
    l_max_erpm: 50000.0 #设置最大ERPM，单位为ERPM
    p_pid_kd_proc: 0.00 #设置位置环kd系数，单位为ERPM

  initial_params:
    p_pid_kp: 0.04
    p_pid_kd_proc: 0.0000
  max_iterations: 3
  improve_threshold: 0.2
  # auto_write_params=true 时，调试过程中会自动写入参数并自动进入下一轮；
  # 每次写入后会回读校验，不一致则立即终止；整轮结束后会把历史最优参数带保存标志写入。
  auto_write_params: true
  #这里设置的是是否在每次迭代后手动确认，false表示自动确认，true表示手动确认。
  manual_confirm_each_iteration: true
  step_scale:
    kp: 0.50
  param_limits:
    kp_min: 0.0010
    kp_max: 0.1000
    kd_proc_min: 0.0000
    kd_proc_max: 0.0010
  #评分权重设置
  kpi_weights:
    position_stability: 0.45
    load_hold: 0.20
    step_response: 0.25
    rebound: 0.10
    current_efficiency: 0.0
